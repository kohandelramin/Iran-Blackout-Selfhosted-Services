services:
  teamspeak:
    image: teamspeak:latest
    container_name: teamspeak
    restart: unless-stopped
    environment:
      - TS3SERVER_LICENSE=accept
      - TZ=${TZ:-Asia/Tehran}
    ports:
      - "9987:9987/udp"
      - "10011:10011/tcp"
      - "30033:30033/tcp"
    volumes:
      - ./data:/var/ts3server
