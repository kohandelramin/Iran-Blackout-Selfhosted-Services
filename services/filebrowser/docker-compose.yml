services:
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - "8088:80"
    volumes:
      - ./data:/srv
      - ./database:/database
      - ./config/settings.json:/config/settings.json
    environment:
      - TZ=${TZ:-Asia/Tehran}
